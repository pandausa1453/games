<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Make page take full screen */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Main container fullscreen */
#iframe_box_inner_container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
}

/* Game wrapper */
.box_embed2 {
    width: 100%;
    height: 100%;
    background: #000;
}

/* iframe fills everything */
#iframehtml5 {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<div id="iframe_box_inner_container">
    <div class="box_embed2" id="box_embed2">
        <iframe 
            id="iframehtml5"
            src="https://games.yoplay.io/cowboy-safari/?v=1"
            allowfullscreen
            sandbox="allow-forms allow-modals allow-same-origin allow-scripts allow-pointer-lock allow-orientation-lock allow-presentation allow-downloads">
        </iframe>
    </div>
</div>

</body>
</html>
