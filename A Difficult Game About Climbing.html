<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #0b132b;
}

#game-frame {
  width: 100%;
  height: 100%;
  border: none;
}

/* Fullscreen button */
#fs-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 10px 16px;
  background: #1c2541;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  z-index: 9999;
}

#fs-btn:hover {
  background: #3a506b;
}
</style>
</head>

<body>

<button id="fs-btn">Fullscreen</button>

<iframe id="game-frame" src="https://pandausa1453.github.io/games/A%20Difficult%20Game%20About%20Climbing.html"></iframe>

<script>
const btn = document.getElementById("fs-btn");
const frame = document.getElementById("game-frame");

btn.onclick = () => {
  const newWindow = window.open("about:blank", "_blank");

  newWindow.document.write(`
    <html>
      <head>
        <title>Game</title>
        <style>
          html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: black;
          }
          iframe {
            width: 100%;
            height: 100%;
            border: none;
          }
        </style>
      </head>
      <body>
        <iframe src="${frame.src}"></iframe>
      </body>
    </html>
  `);

  newWindow.document.close();
};
</script>

</body>
</html>
