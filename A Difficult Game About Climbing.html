
<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | A Difficult Game About Climbing</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #231F20;
    }
    #unity-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
    #popupBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.75);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 9999;
      font-family: Arial, sans-serif;
      transition: 0.2s;
    }
    #popupBtn:hover {
      background: rgba(0,0,0,0.9);
    }
  </style>
</head>
<body>

  <button id="popupBtn">Open in Window</button>

  <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">LOADING...</div>

  <div id="unity-container" class="unity-desktop" hidden>
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
    // Popup button
    const btn = document.getElementById("popupBtn");
    btn.onclick = () => {
      const win = window.open("", "_blank", "width=1200,height=700");
      win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>A Difficult Game About Climbing</title>
          <style>
            html, body {
              margin: 0;
              padding: 0;
              height: 100%;
              overflow: hidden;
              background: #231F20;
            }
            iframe {
              width: 100%;
              height: 100%;
              border: none;
            }
          </style>
        </head>
        <body>
          <iframe src="https://cdn.jsdelivr.net/gh/web-ports/adgac@main/index.html"></iframe>
        </body>
        </html>
      `);
      win.document.close();
      btn.style.display = "none";
    };

    // Auto-hide after 10 seconds
    setTimeout(() => {
      btn.style.display = "none";
    }, 10000);

    // Unity loader
    const loadingText = document.querySelector("#loading-text");
    let loadedBytes = 0;

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      let chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);
        loadingText.textContent = `LOADING... ${(loadedBytes / (1024 * 1024)).toFixed(2)} MB / 319.89 MB`;
      }
      const fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }
      return fullBuffer.buffer;
    }

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(`${file}.part${i}`);
      }
      return parts;
    }

    async function mergeFiles(fileParts) {
      const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
      const mergedBlob = new Blob(buffers);
      return URL.createObjectURL(mergedBlob);
    }

    (async () => {
      const [dataUrl, wasmUrl] = await Promise.all([
        mergeFiles(getParts("Build/adgac.data", 1, 14)),
        mergeFiles(getParts("Build/adgac.wasm", 1, 3)),
      ]);

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/adgac.loader.js";
      const config = {
        dataUrl,
        frameworkUrl: "Build/adgac.framework.js",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Pontypants",
        productName: "A Difficult Game About Climbing",
        productVersion: "1.2.61",
      };

      const container = document.querySelector("#unity-container");
      container.hidden = false;
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      } else {
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
      }

      loadingBar.style.display = "block";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then(() => {
          loadingText.remove();
          loadingBar.style.display = "none";
          canvas.style.display = "block";
        }).catch(message => alert(message));
      };
      document.body.appendChild(script);
    })();
  </script>

</body>
</html>
